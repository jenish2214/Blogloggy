# QuantDesk — Render Blueprint
# Frontend: https://algo-street.vercel.app (Vercel, not Render)
# Docs: docs/RENDER.md

services:
  - type: web
    name: quantdesk-api
    runtime: node
    plan: free
    region: virginia
    branch: main
    autoDeploy: true
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: https://algo-street.vercel.app,https://blogloggy.vercel.app
      - key: MASSIVE_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false

  - type: web
    name: quantdesk-quant
    runtime: python
    plan: free
    region: virginia
    branch: main
    autoDeploy: true
    rootDir: quant-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    buildFilter:
      paths:
        - quant-service/**
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CORS_ORIGINS
        value: https://algo-street.vercel.app,http://localhost:3000
